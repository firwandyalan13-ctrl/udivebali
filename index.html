<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UdiveBali - 图兰奔专业潜水中心</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── DESIGN TOKENS ───────────────────────────────────────────────────────────
    const tokens = {
      ocean:    "#0A2540",   // deep navy
      abyss:    "#061A30",   // darkest bg
      lagoon:   "#0E4D6B",   // mid ocean
      current:  "#1A7A9A",   // accent teal
      foam:     "#E8F4F8",   // light surface
      pearl:    "#F7FAFB",
      cta:      "#FF6B1A",   // high-impact orange
      ctaHover: "#E85A0A",
      gold:     "#C9A96E",   // premium accent
      white:    "#FFFFFF",
      gray400:  "#94A3B8",
      gray600:  "#475569",
      brandRed: "#FF4444",  // brand red
      textGradient1: "#FFFFFF",
      textGradient2: "#FFB4B4",
      textGradient3: "#FFD9D9",
    };

    // ─── GLOBAL STYLES injected into <head> ──────────────────────────────────────
    const GlobalStyle = () => (
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --ocean: ${tokens.ocean};
          --abyss: ${tokens.abyss};
          --lagoon: ${tokens.lagoon};
          --current: ${tokens.current};
          --foam: ${tokens.foam};
          --pearl: ${tokens.pearl};
          --cta: ${tokens.cta};
          --cta-hover: ${tokens.ctaHover};
          --gold: ${tokens.gold};
        }

        html { scroll-behavior: smooth; }

        body {
          font-family: 'DM Sans', sans-serif;
          background: var(--abyss);
          color: var(--white);
          overflow-x: hidden;
        }

        h1, h2, h3, h4 {
          font-family: 'Cormorant Garamond', serif;
          font-weight: 600;
          letter-spacing: -0.01em;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--abyss); }
        ::-webkit-scrollbar-thumb { background: var(--lagoon); border-radius: 2px; }

        /* Animations */
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(30px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
        @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50%       { transform: translateY(-8px); }
        }
        @keyframes pulse-ring {
          0%   { transform: scale(0.8); opacity: 0.8; }
          100% { transform: scale(1.6); opacity: 0; }
        }
        @keyframes shimmer {
          0%   { background-position: -200% center; }
          100% { background-position: 200% center; }
        }
        @keyframes wave {
          0%   { transform: translateX(0); }
          100% { transform: translateX(-50%); }
        }

        .animate-fadeUp   { animation: fadeUp 0.8s ease forwards; }
        .animate-fadeIn   { animation: fadeIn 0.6s ease forwards; }
        .animate-float    { animation: float 4s ease-in-out infinite; }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* CTA Button */
        .btn-cta {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          background: var(--cta);
          color: #fff;
          font-family: 'DM Sans', sans-serif;
          font-weight: 600;
          font-size: 0.95rem;
          padding: 14px 32px;
          border-radius: 4px;
          border: none;
          cursor: pointer;
          transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
          text-decoration: none;
          letter-spacing: 0.02em;
          box-shadow: 0 4px 20px rgba(255,107,26,0.35);
        }
        .btn-cta:hover {
          background: var(--cta-hover);
          transform: translateY(-2px);
          box-shadow: 0 8px 30px rgba(255,107,26,0.45);
        }

        .btn-ghost {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          background: transparent;
          color: #fff;
          font-family: 'DM Sans', sans-serif;
          font-weight: 500;
          font-size: 0.95rem;
          padding: 13px 30px;
          border-radius: 4px;
          border: 1.5px solid rgba(255,255,255,0.4);
          cursor: pointer;
          transition: all 0.2s;
          text-decoration: none;
          letter-spacing: 0.02em;
        }
        .btn-ghost:hover {
          border-color: rgba(255,255,255,0.9);
          background: rgba(255,255,255,0.08);
        }

        /* Section */
        .section { padding: 100px 0; }
        .section-sm { padding: 60px 0; }
        .container {
          max-width: 1200px;
          margin: 0 auto;
          padding: 0 24px;
        }
        .section-label {
          font-family: 'DM Sans', sans-serif;
          font-size: 0.75rem;
          font-weight: 600;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: var(--gold);
          display: block;
          margin-bottom: 16px;
        }
        .section-title {
          font-size: clamp(2rem, 4vw, 3.2rem);
          line-height: 1.15;
          color: var(--white);
        }
        .section-subtitle {
          font-size: 1.05rem;
          line-height: 1.7;
          color: var(--gray400);
          max-width: 560px;
          margin-top: 16px;
        }

        /* Card */
        .card {
          background: rgba(14,77,107,0.18);
          border: 1px solid rgba(255,255,255,0.07);
          border-radius: 12px;
          overflow: hidden;
          transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .card:hover {
          transform: translateY(-6px);
          border-color: rgba(201,169,110,0.3);
          box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* Nav */
        .nav {
          position: fixed;
          top: 0; left: 0; right: 0;
          z-index: 100;
          transition: background 0.4s, backdrop-filter 0.4s;
        }
        .nav.scrolled {
          background: rgba(6,26,48,0.95);
          backdrop-filter: blur(12px);
          box-shadow: 0 1px 0 rgba(255,255,255,0.07);
        }
        .nav-inner {
          max-width: 1200px;
          margin: 0 auto;
          padding: 0 24px;
          height: 72px;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }
        .nav-links a {
          color: rgba(255,255,255,0.75);
          text-decoration: none;
          font-size: 0.9rem;
          font-weight: 500;
          margin-left: 32px;
          transition: color 0.2s;
        }
        .nav-links a:hover { color: #fff; }

        /* Hero */
        .hero {
          position: relative;
          min-height: 100vh;
          display: flex;
          align-items: center;
          overflow: hidden;
        }
        .hero-bg {
          position: absolute;
          inset: 0;
          background: linear-gradient(135deg, #051525 0%, #0A2540 40%, #0E4D6B 70%, #0A3550 100%);
        }
        .hero-overlay {
          position: absolute;
          inset: 0;
          background: linear-gradient(to bottom, rgba(6,26,48,0.3) 0%, rgba(6,26,48,0.6) 60%, rgba(6,26,48,0.95) 100%);
        }
        .hero-grid {
          position: absolute;
          inset: 0;
          background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
          background-size: 60px 60px;
        }
        .hero-bubbles {
          position: absolute;
          inset: 0;
          pointer-events: none;
        }
        .bubble {
          position: absolute;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(26,122,154,0.3), transparent);
          animation: float 6s ease-in-out infinite;
        }

        /* Wave decoration */
        .wave-container {
          position: absolute;
          bottom: 0; left: 0; right: 0;
          height: 120px;
          overflow: hidden;
        }
        .wave-svg { width: 200%; animation: wave 12s linear infinite; }

        /* Trust bar */
        .trust-bar {
          background: rgba(10,37,64,0.95);
          border-top: 1px solid rgba(201,169,110,0.2);
          border-bottom: 1px solid rgba(255,255,255,0.06);
          backdrop-filter: blur(8px);
        }
        .trust-item {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 8px;
          text-align: center;
          padding: 28px 16px;
          border-right: 1px solid rgba(255,255,255,0.06);
        }
        .trust-item:last-child { border-right: none; }
        .trust-icon {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          background: rgba(26,122,154,0.2);
          border: 1px solid rgba(26,122,154,0.4);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 18px;
        }

        /* Courses grid */
        .course-card {
          position: relative;
          border-radius: 12px;
          overflow: hidden;
          background: linear-gradient(145deg, rgba(14,77,107,0.25), rgba(6,26,48,0.6));
          border: 1px solid rgba(255,255,255,0.07);
          transition: all 0.35s;
        }
        .course-card:hover { transform: translateY(-8px); box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
        .course-card-img {
          height: 220px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 64px;
          position: relative;
          overflow: hidden;
        }
        .price-tag {
          display: inline-flex;
          align-items: baseline;
          gap: 4px;
          background: rgba(255,107,26,0.12);
          border: 1px solid rgba(255,107,26,0.3);
          border-radius: 999px;
          padding: 6px 16px;
          margin-bottom: 16px;
        }

        /* Team */
        .team-card {
          border-radius: 12px;
          overflow: hidden;
          background: rgba(14,77,107,0.15);
          border: 1px solid rgba(255,255,255,0.07);
          transition: all 0.3s;
          text-align: center;
          padding-bottom: 20px;
        }
        .team-card:hover { border-color: rgba(201,169,110,0.3); transform: translateY(-4px); }
        .team-avatar {
          height: 180px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 56px;
          position: relative;
          overflow: hidden;
        }

        /* Social wall */
        .social-tile {
          border-radius: 10px;
          overflow: hidden;
          aspect-ratio: 1;
          position: relative;
          cursor: pointer;
          transition: transform 0.3s;
        }
        .social-tile:hover { transform: scale(1.03); }
        .social-overlay {
          position: absolute;
          inset: 0;
          background: rgba(6,26,48,0.6);
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: 0;
          transition: opacity 0.3s;
        }
        .social-tile:hover .social-overlay { opacity: 1; }

        /* Form */
        .form-input {
          width: 100%;
          background: rgba(255,255,255,0.05);
          border: 1px solid rgba(255,255,255,0.12);
          border-radius: 8px;
          padding: 14px 18px;
          color: #fff;
          font-family: 'DM Sans', sans-serif;
          font-size: 0.95rem;
          outline: none;
          transition: border-color 0.2s, background 0.2s;
        }
        .form-input:focus {
          border-color: var(--current);
          background: rgba(26,122,154,0.1);
        }
        .form-input::placeholder { color: rgba(255,255,255,0.35); }
        .form-label {
          display: block;
          font-size: 0.82rem;
          font-weight: 500;
          color: rgba(255,255,255,0.6);
          margin-bottom: 8px;
          letter-spacing: 0.05em;
        }
        select.form-input option { background: #0A2540; }

        /* FAB */
        .fab {
          position: fixed;
          bottom: 28px;
          right: 28px;
          z-index: 200;
        }
        .fab-main {
          width: 58px;
          height: 58px;
          border-radius: 50%;
          background: var(--cta);
          border: none;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 24px;
          box-shadow: 0 4px 24px rgba(255,107,26,0.5);
          transition: transform 0.3s, box-shadow 0.3s;
          position: relative;
          z-index: 2;
        }
        .fab-main::before {
          content: '';
          position: absolute;
          inset: 0;
          border-radius: 50%;
          background: var(--cta);
          animation: pulse-ring 2s ease-out infinite;
        }
        .fab-main:hover { transform: scale(1.08); box-shadow: 0 8px 32px rgba(255,107,26,0.6); }
        .fab-menu {
          position: absolute;
          bottom: 72px;
          right: 0;
          display: flex;
          flex-direction: column;
          gap: 12px;
          align-items: flex-end;
        }
        .fab-item {
          display: flex;
          align-items: center;
          gap: 10px;
          background: rgba(6,26,48,0.96);
          border: 1px solid rgba(255,255,255,0.12);
          border-radius: 8px;
          padding: 10px 16px;
          cursor: pointer;
          white-space: nowrap;
          transition: border-color 0.2s, transform 0.2s;
          text-decoration: none;
          color: #fff;
        }
        .fab-item:hover { border-color: rgba(255,255,255,0.3); transform: translateX(-4px); }

        /* Divider */
        .gold-divider {
          width: 60px;
          height: 2px;
          background: linear-gradient(90deg, var(--gold), transparent);
          margin: 20px 0 32px;
        }

        /* Scarcity */
        .scarcity-bar {
          background: linear-gradient(90deg, rgba(255,107,26,0.12), rgba(255,107,26,0.06));
          border: 1px solid rgba(255,107,26,0.25);
          border-radius: 8px;
          padding: 14px 20px;
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 32px;
        }

        /* Room grid */
        .room-card {
          border-radius: 12px;
          overflow: hidden;
          background: rgba(14,77,107,0.15);
          border: 1px solid rgba(255,255,255,0.07);
          transition: all 0.3s;
        }
        .room-card:hover { border-color: rgba(201,169,110,0.3); transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .room-img {
          height: 200px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 52px;
          position: relative;
          overflow: hidden;
        }

        /* Stats */
        .stat-card {
          text-align: center;
          padding: 40px 20px;
          border-right: 1px solid rgba(255,255,255,0.06);
        }
        .stat-card:last-child { border-right: none; }
        .stat-num {
          font-family: 'Cormorant Garamond', serif;
          font-size: 3.5rem;
          font-weight: 700;
          background: linear-gradient(135deg, #fff, var(--gold));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          line-height: 1;
        }

        /* Mobile */
        @media (max-width: 768px) {
          .section { padding: 64px 0; }
          .nav-links { display: none; }
          .container { padding: 0 16px; }
          .trust-bar-grid { grid-template-columns: 1fr 1fr; }
          .trust-item { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
          .hero-btns { flex-direction: column; gap: 12px; }
          .hero-btns .btn-cta, .hero-btns .btn-ghost { width: 100%; justify-content: center; }
          .fab { bottom: 20px; right: 20px; }
          
          /* Course cards */
          .course-card { overflow: hidden; }
          .course-card-img { height: 180px; }
          
          /* Room cards */
          .room-card { overflow: hidden; }
          .room-img { height: 160px; }
          
          /* Form */
          form { gap: 16px !important; }
          .form-input { padding: 12px 14px !important; font-size: 16px !important; }
          
          /* Stats */
          .stat-card { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
          
          /* Footer */
          footer { padding: 32px 0 20px; }
          
          /* Titles */
          .section-title { font-size: clamp(1.8rem, 6vw, 2.5rem) !important; }
          
          /* Grid layouts */
          [style*="grid-template-columns: 1fr 1fr"] {
            grid-template-columns: 1fr !important;
            gap: 24px !important;
          }
        }
        
        /* Extra small screens */
        @media (max-width: 480px) {
          .section { padding: 48px 0; }
          .section-title { font-size: clamp(1.6rem, 8vw, 2rem) !important; }
          .trust-bar-grid { grid-template-columns: 1fr; }
          .trust-item { border-bottom: 1px solid rgba(255,255,255,0.06); }
          .social-tile-grid { grid-template-columns: repeat(2, 1fr) !important; }
          .stat-card { border-bottom: 1px solid rgba(255,255,255,0.06); padding: 32px 16px; }
          
          /* Footer grid */
          footer [style*="grid-template-columns: 2fr 1fr 1fr 1fr"] {
            grid-template-columns: 1fr !important;
            gap: 24px !important;
          }
          
          /* Footer bottom section */
          footer div[style*="justifyContent: space-between"] {
            flexDirection: column !important;
            alignItems: center !important;
            textAlign: center !important;
          }
          
          /* Booking form grid */
          .form-input { padding: 14px 16px !important; }
          
          /* Contact cards */
          div[style*="flexDirection: column"][style*="gap: 16"] {
            gap: 12px !important;
          }
          
          /* Scarcity bar */
          .scarcity-bar {
            flex-direction: column !important;
            text-align: left !important;
            padding: 16px !important;
          }
          
          /* Hero content */
          .container div[style*="maxWidth: 700px"] {
            max-width: 100% !important;
          }
        }
        
        /* Prevent overflow and horizontal scroll */
        html, body {
          overflow-x: hidden;
          max-width: 100vw;
        }
        
        * {
          box-sizing: border-box;
        }
      `}</style>
    );

    // ─── ICONS (inline SVG) ───────────────────────────────────────────────────────
    const IconShield   = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
    const IconHome     = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
    const IconBadge    = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>;
    const IconGlobe    = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>;
    const IconArrow    = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
    const IconChat     = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>;
    const IconX        = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const IconStar     = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const IconAlert    = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const IconCalendar = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
    const IconCheck    = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>;

    // ─── NAV ──────────────────────────────────────────────────────────────────────
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 60);
        window.addEventListener("scroll", h);
        return () => window.removeEventListener("scroll", h);
      }, []);
      return (
        <nav className={`nav${scrolled ? " scrolled" : ""}`}>
          <div className="nav-inner">
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ fontSize: 28 }}>🤿</div>
              <div>
                <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "1.35rem", fontWeight: 700, letterSpacing: "0.05em", lineHeight: 1, background: "linear-gradient(135deg, #FF4444 0%, #FF6666 50%, #FF8888 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>UdiveBali</div>
                <div style={{ fontSize: "0.65rem", color: tokens.gold, letterSpacing: "0.2em", textTransform: "uppercase" }}>Tulamben · Est. 2018</div>
              </div>

    // ─── BOOKING FORM ─────────────────────────────────────────────────────────────
    function Booking() {
      const [form, setForm] = useState({ name: "", contact: "", date: "", intent: "", notes: "" });
      const [submitted, setSubmitted] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState("");

      const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });
      const handleSubmit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        setError("");

        // 提交到 Supabase
        if (window.submitBooking) {
          const result = await window.submitBooking(form);
          if (result.success) {
            setSubmitted(true);
          } else {
            setError("提交失败，请稍后重试或直接联系我们");
            console.error(result.error);
          }
        } else {
          // Fallback: 仅设置提交状态
          setSubmitted(true);
        }
        setSubmitting(false);
      };

      return (
        <section className="section" id="booking" style={{ background: "var(--ocean)" }}>
          <div className="container">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 80, alignItems: "start" }}>
              {/* Left */}
              <div>
                <span className="section-label">Book Now</span>
                <h2 className="section-title" style={{ background: "linear-gradient(135deg, #FFFFFF 0%, #FFB4B4 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>Start Your<br />Deep Blue Journey</h2>
                <div className="gold-divider" />
                <p style={{ color: tokens.gray400, lineHeight: 1.8, marginBottom: 36 }}>
                  Fill out the form below and our dedicated consultant will contact you within <strong style={{ background: "linear-gradient(135deg, #FFFFFF 0%, #FFB4B4 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>24 hours</strong> to customize your diving itinerary.
                </p>
                {/* Contact cards */}
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  {[
                    { icon: "💬", label: "WeChat", val: "alanfirwandy" },
                    { icon: "📱", label: "WhatsApp", val: "+60128001317" },
                    { icon: "📧", label: "Email", val: "firwandyalan13@gmail.com" },
                  ].map((c, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 16, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "14px 20px" }}>
                      <span style={{ fontSize: 24 }}>{c.icon}</span>
                      <div>
                        <div style={{ fontSize: "0.75rem", color: tokens.gray400, marginBottom: 2 }}>{c.label}</div>
                        <div style={{ fontWeight: 500, background: "linear-gradient(135deg, #FFFFFF 0%, #FFB4B4 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>{c.val}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Form */}
              <div>
                {/* Scarcity */}
                <div className="scarcity-bar">
                  <span style={{ color: tokens.cta, flexShrink: 0 }}><IconAlert /></span>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: "0.9rem", color: "#fff", marginBottom: 2 }}>Peak Season Availability Limited</div>
                    <div style={{ fontSize: "0.82rem", color: "rgba(255,107,26,0.8)" }}>Holiday and summer slots filling fast. Book 60 days in advance to secure your spot.</div>
                  </div>
                </div>

                {!submitted ? (
                  <form onSubmit={handleSubmit} style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                    {error && (
                      <div style={{ background: "rgba(255,82,82,0.15)", border: "1px solid rgba(255,82,82,0.3)", borderRadius: 8, padding: "12px 16px", color: "#ff5252", fontSize: "0.85rem" }}>
                        {error}
                      </div>
                    )}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                      <div>
                        <label className="form-label">Your Name *</label>
                        <input name="name" className="form-input" placeholder="Name" value={form.name} onChange={handleChange} required />
                      </div>
                      <div>
                        <label className="form-label">Contact *</label>
                        <input name="contact" className="form-input" placeholder="WeChat or WhatsApp" value={form.contact} onChange={handleChange} required />
                      </div>
                    </div>

                    <div>
                      <label className="form-label"><span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><IconCalendar /> Planned Travel Date *</span></label>
                      <input name="date" type="date" className="form-input" value={form.date} onChange={handleChange} required />
                    </div>

                    <div>
                      <label className="form-label">Interest *</label>
                      <select name="intent" className="form-input" value={form.intent} onChange={handleChange} required>
                        <option value="">Select Your Interest</option>
                        <option value="ow">PADI Open Water Diver (OW)</option>
                        <option value="aow">PADI Advanced Open Water (AOW)</option>
                        <option value="free">Freediving Course</option>
                        <option value="dsd">Discover Scuba Diving (No Experience)</option>
                        <option value="resort">Accommodation Only</option>
                        <option value="package">Diving + Accommodation Package</option>
                        <option value="group">Group/Corporate Custom</option>
                      </select>
                    </div>

                    <div>
                      <label className="form-label">Additional Notes (group size, special requests, etc.)</label>
                      <textarea name="notes" className="form-input" placeholder="e.g., Two people traveling, one holds OW certificate..." value={form.notes} onChange={handleChange} rows={3} style={{ resize: "vertical" }} />
                    </div>

                    <button type="submit" className="btn-cta" style={{ justifyContent: "center", padding: "16px", fontSize: "1rem" }} disabled={submitting}>
                      {submitting ? "Submitting..." : "Get Quote · 24 Hour Response"} <IconArrow />
                    </button>

                    <p style={{ fontSize: "0.75rem", color: tokens.gray400, textAlign: "center" }}>
                      Your information is kept confidential and used only for travel consultation. We do not share with third parties.
                    </p>
                  </form>
                ) : (
                  <div style={{ textAlign: "center", padding: "60px 40px", background: "rgba(26,122,154,0.1)", border: "1px solid rgba(26,122,154,0.3)", borderRadius: 12 }}>
                    <div style={{ fontSize: 64, marginBottom: 20 }}>🎉</div>
                    <h3 style={{ fontSize: "1.5rem", background: "linear-gradient(135deg, #FFFFFF 0%, #FFB4B4 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text", marginBottom: 12 }}>Request Submitted!</h3>
                    <p style={{ color: tokens.gray400, lineHeight: 1.7 }}>We've received your information. Our dedicated consultant will contact you within <strong style={{ background: "linear-gradient(135deg, #FFFFFF 0%, #FFB4B4 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>24 hours</strong> via your preferred contact method.</p>
                    <div style={{ marginTop: 24, fontSize: "0.88rem", color: tokens.current }}>Thank you for choosing UdiveBali 🤿</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ─── FOOTER ───────────────────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer style={{ background: "var(--abyss)", borderTop: "1px solid rgba(255,255,255,0.06)", padding: "48px 0 24px" }}>
          <div className="container">
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 40, marginBottom: 40 }}>

                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                  <span style={{ fontSize: 28 }}>🤿</span>
                  <div>

                    <div style={{ fontSize: "0.65rem", color: tokens.gold, letterSpacing: "0.15em" }}>TULAMBEN · BALI</div>
                  </div>
                </div>
                <p style={{ fontSize: "0.85rem", color: tokens.gray400, lineHeight: 1.8, maxWidth: 280 }}>Tulamben's most trusted diving center and boutique resort. 7 years dedicated to creating safe, unforgettable deep blue experiences for every diver.</p>
              </div>
              {[
                { title: "Courses", items: ["PADI Open Water OW", "PADI Advanced AOW", "Freediving", "Discover Scuba DSD"] },
                { title: "Resort", items: ["Single Room", "Double Room", "Triple Room", "Dining"] },
                { title: "About Us", items: ["Our Team", "Community", "Contact Us", "Booking Info"] },
              ].map((col, i) => (
                <div key={i}>
                  <div style={{ fontWeight: 600, fontSize: "0.85rem", background: "linear-gradient(135deg, #FFFFFF 0%, #FFB4B4 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text", marginBottom: 16, letterSpacing: "0.05em" }}>{col.title}</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {col.items.map((item, j) => (
                      <a key={j} href="#" style={{ fontSize: "0.83rem", color: tokens.gray400, textDecoration: "none", transition: "color 0.2s" }} onMouseEnter={e => e.target.style.color="#fff"} onMouseLeave={e => e.target.style.color=tokens.gray400}>{item}</a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
              <div style={{ fontSize: "0.78rem", color: tokens.gray400 }}>© 2025 UdiveBali. All rights reserved. · Jl. Singaraja-Amlapura, Tulamben, Bali 80852</div>
              <div style={{ fontSize: "0.78rem", color: tokens.gray400 }}>PADI Dive Center · AIDA Partner · SSI Affiliate</div>
            </div>
          </div>
        </footer>
      );
    }

        <div className="fab">
          {open && (

              <a href="https://wa.me/60128001317" target="_blank" rel="noreferrer" className="fab-item">
                <span style={{ fontSize: 20 }}>📱</span>
                <div>
                  <div style={{ fontWeight: 600, fontSize: "0.88rem" }}>WhatsApp Chat</div>
                  <div style={{ fontSize: "0.75rem", color: tokens.gray400 }}>+60128001317</div>
                </div>
              </a>
              <div className="fab-item">
                <span style={{ fontSize: 20 }}>💬</span>
                <div>
                  <div style={{ fontWeight: 600, fontSize: "0.88rem" }}>WeChat QR</div>

    // ─── APP ──────────────────────────────────────────────────────────────────────
    function UdiveBali() {
      return (
        <>
          <GlobalStyle />
          <Nav />
          <main>
            <Hero />
            <TrustBar />
          <Stats />
          <Courses />
          <Resort />
          <Social />
          <Booking />
          </main>
          <Footer />
          <FAB />

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<UdiveBali />);
  </script>
